<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TV Video Library</title>
<style>
:root{font-family:Arial,system-ui,sans-serif;color:#f5f7ff;background:#080b14;--muted:#aab3c7;--accent:#59b7ff;--panel:#111827}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 80% 0,#183459 0,#080b14 46%);font-size:18px}header{padding:34px 5vw 20px;display:flex;justify-content:space-between;align-items:end;gap:20px}h1{font-size:clamp(30px,4vw,54px);margin:0 0 8px}p{color:var(--muted);margin:0}.badge{color:#07101c;background:var(--accent);padding:8px 13px;border-radius:99px;font-weight:bold}.toolbar{padding:0 5vw 25px;display:flex;gap:14px;flex-wrap:wrap}.search{flex:1;min-width:240px;background:#0e1524;border:2px solid #30425e;color:#fff;border-radius:12px;padding:15px 18px;font-size:20px;outline:none}.search:focus{border-color:var(--accent)}button{background:#1c2a40;color:#fff;border:1px solid #3a5277;border-radius:11px;padding:13px 20px;font-size:18px;cursor:pointer}button:focus,.card:focus{outline:3px solid var(--accent);outline-offset:3px}.grid{padding:0 5vw 50px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px}.card{background:linear-gradient(145deg,#17243a,#101725);border:1px solid #2a3d5c;border-radius:18px;overflow:hidden;min-height:310px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:.2s transform,.2s border-color,.2s box-shadow}.card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 15px 35px #0008}.thumb{height:170px;background:#0a101d center/cover no-repeat;position:relative}.thumb:after{content:'▶';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:#080b14cc;color:#fff;font-size:24px;padding-left:3px;box-shadow:0 5px 22px #0008}.cardbody{padding:18px 20px}.date{color:var(--accent);font-size:15px;font-weight:bold;text-transform:uppercase;letter-spacing:.08em}.title{font-weight:bold;font-size:22px;line-height:1.25;margin:10px 0}.type{color:var(--muted);font-size:15px}.empty{margin:0 5vw;padding:30px;border:1px dashed #40516c;border-radius:14px;color:var(--muted)}dialog{background:#111827;color:#fff;border:1px solid #496182;border-radius:16px;width:min(900px,90vw);padding:0}dialog::backdrop{background:#000b}.modal{padding:24px}.modal h2{margin-top:0}.modal a{display:block;color:#8bc9ff;word-break:break-all;margin:14px 0}.close{float:right}.hint{padding:0 5vw 30px;color:#7687a3;font-size:14px}@media(max-width:600px){header{display:block}.badge{display:inline-block;margin-top:16px}.grid{grid-template-columns:1fr}}
</style></head><body>
<header><div><h1>TV Video Library</h1><p id="sub">Importing episodes from <strong>video_results.json</strong>…</p></div><span class="badge">D-PAD READY</span></header>
<div class="toolbar"><input id="search" class="search" autofocus placeholder="Search episodes…" aria-label="Search episodes"><button id="refresh">Refresh</button></div>
<section id="grid" class="grid" aria-live="polite"></section><div id="empty" class="empty" hidden>No matching episodes found.</div>
<div class="hint">Use arrow keys to move, Enter to open an episode, and Escape to close. Links come from the public video_results.json report.</div>
<dialog id="dialog"><div class="modal"><button class="close" id="close">Close</button><h2 id="mtitle"></h2><p id="mpage"></p><div id="links"></div></div></dialog>
<script>
const grid=document.querySelector('#grid'),empty=document.querySelector('#empty'),search=document.querySelector('#search'),sub=document.querySelector('#sub'),dialog=document.querySelector('#dialog');let records=[];
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function render(){let q=search.value.toLowerCase();let a=records.filter(x=>(x.title||'').toLowerCase().includes(q));grid.innerHTML=a.map((x,i)=>{let bg=x.thumbnail?` style="background-image:url('${esc(x.thumbnail)}')"`:'';return `<article class="card" tabindex="0" data-i="${records.indexOf(x)}"><div class="thumb"${bg}></div><div class="cardbody"><div class="date">Episode ${String(x.number||i+1).padStart(2,'0')}</div><div class="title">${esc(x.title||'Untitled')}</div><div class="type">${x.direct_urls?.length?'Direct media':x.embed_urls?.length?'Embedded video':'No media detected'} · Press Enter</div></div></article>`}).join('');empty.hidden=a.length>0;sub.textContent=`${a.length} episode${a.length===1?'':'s'} · Updated from video_results.json`;document.querySelectorAll('.card').forEach(c=>c.onclick=()=>open(+c.dataset.i));}
function open(i){let x=records[i];if(!x)return;document.querySelector('#mtitle').textContent=x.title||'Video';document.querySelector('#mpage').innerHTML=`Page: <a href="${esc(x.page_url)}" target="_blank" rel="noopener">${esc(x.page_url)}</a>`;let urls=[...(x.direct_urls||[]),...(x.embed_urls||[])];document.querySelector('#links').innerHTML=urls.length?urls.map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener">Open video link</a>`).join(''):'<p>No public media link was detected.</p>';dialog.showModal();}
async function load(){sub.textContent='Loading episode catalogue…';try{let r=await fetch('video_results.json?ts='+Date.now());if(!r.ok)throw Error();records=await r.json();render();sub.textContent=`${records.length} episode${records.length===1?'':'s'} · Imported from video_results.json`}catch(e){records=[];grid.innerHTML='';empty.hidden=false;empty.textContent='No video_results.json found. Run the GitHub Action and publish the report to this folder.';sub.textContent='Import failed: video_results.json unavailable'}}
search.oninput=render;document.querySelector('#refresh').onclick=load;document.querySelector('#close').onclick=()=>dialog.close();document.onkeydown=e=>{if(e.key==='Escape'&&dialog.open)dialog.close();if(e.key==='Enter'&&document.activeElement.classList.contains('card'))document.activeElement.click()};load();
</script></body></html>
